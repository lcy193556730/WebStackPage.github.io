<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 56" width="300" height="56" role="img" aria-label="GalaxyAI Nav">
  <defs>
    <radialGradient id="gx-sky" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="65%" stop-color="#0a0a10"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="gx-milky" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0"/>
      <stop offset="45%" stop-color="#cbd5e1" stop-opacity="0.16"/>
      <stop offset="55%" stop-color="#e2e8f0" stop-opacity="0.26"/>
      <stop offset="65%" stop-color="#cbd5e1" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#64748b" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="gx-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f1f5f9" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#94a3b8" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#0a0a10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gx-text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <!-- 左侧图标格：与整行同高 56，占满 56×56 -->
    <clipPath id="gx-icon-cell">
      <rect x="0" y="0" width="56" height="56" rx="14" ry="14"/>
    </clipPath>
  </defs>
  <!-- 星空图标：铺满左侧 56×56 格子（与 GalaxyAI 字样同高） -->
  <g clip-path="url(#gx-icon-cell)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#gx-sky)"/>
    <ellipse cx="28" cy="28" rx="24" ry="8" fill="url(#gx-milky)" transform="rotate(-32 28 28)"/>
    <ellipse cx="28" cy="28" rx="20" ry="6" fill="url(#gx-milky)" transform="rotate(48 28 28)" opacity="0.68"/>
    <ellipse cx="28" cy="28" rx="16" ry="5" fill="url(#gx-milky)" transform="rotate(118 28 28)" opacity="0.5"/>
    <circle cx="28" cy="28" r="13" fill="url(#gx-core)"/>
    <!-- 星点（布满格子） -->
    <circle cx="6" cy="8" r="0.45" fill="#f8fafc" opacity="0.9"/>
    <circle cx="14" cy="5" r="0.3" fill="#e2e8f0" opacity="0.75"/>
    <circle cx="10" cy="14" r="0.22" fill="#cbd5e1" opacity="0.65"/>
    <circle cx="4" cy="18" r="0.55" fill="#fff" opacity="0.95"/>
    <circle cx="8" cy="26" r="0.28" fill="#94a3b8" opacity="0.6"/>
    <circle cx="5" cy="34" r="0.38" fill="#e2e8f0" opacity="0.8"/>
    <circle cx="12" cy="38" r="0.2" fill="#64748b" opacity="0.55"/>
    <circle cx="16" cy="10" r="0.35" fill="#f1f5f9" opacity="0.85"/>
    <circle cx="22" cy="6" r="0.24" fill="#cbd5e1" opacity="0.65"/>
    <circle cx="28" cy="4" r="0.65" fill="#fff" opacity="0.92"/>
    <circle cx="34" cy="8" r="0.22" fill="#e2e8f0" opacity="0.6"/>
    <circle cx="40" cy="5" r="0.4" fill="#f8fafc" opacity="0.88"/>
    <circle cx="48" cy="10" r="0.26" fill="#e2e8f0" opacity="0.72"/>
    <circle cx="52" cy="16" r="0.2" fill="#94a3b8" opacity="0.5"/>
    <circle cx="46" cy="22" r="0.48" fill="#fff" opacity="0.9"/>
    <circle cx="50" cy="30" r="0.25" fill="#cbd5e1" opacity="0.68"/>
    <circle cx="44" cy="36" r="0.32" fill="#e2e8f0" opacity="0.75"/>
    <circle cx="38" cy="42" r="0.22" fill="#64748b" opacity="0.55"/>
    <circle cx="30" cy="48" r="0.28" fill="#f1f5f9" opacity="0.7"/>
    <circle cx="22" cy="46" r="0.2" fill="#cbd5e1" opacity="0.55"/>
    <circle cx="14" cy="44" r="0.62" fill="#fff" opacity="0.78"/>
    <circle cx="18" cy="28" r="0.28" fill="#f1f5f9" opacity="0.58"/>
    <circle cx="36" cy="26" r="0.24" fill="#cbd5e1" opacity="0.52"/>
    <circle cx="24" cy="20" r="0.18" fill="#94a3b8" opacity="0.45"/>
    <circle cx="32" cy="32" r="0.2" fill="#e2e8f0" opacity="0.5"/>
    <circle cx="8" cy="42" r="0.18" fill="#cbd5e1" opacity="0.5"/>
    <circle cx="42" cy="14" r="0.2" fill="#f8fafc" opacity="0.65"/>
    <circle cx="26" cy="14" r="0.18" fill="#fff" opacity="0.55"/>
    <circle cx="32" cy="18" r="0.55" fill="#fff" opacity="0.72"/>
  </g>
  <rect x="0.5" y="0.5" width="55" height="55" rx="13.5" fill="none" stroke="#3f3f46" stroke-width="1" opacity="0.95"/>
  <!-- 字样紧贴图标格右侧 -->
  <text x="64" y="39" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="url(#gx-text)" letter-spacing="-0.03em">GalaxyAI</text>
</svg>
